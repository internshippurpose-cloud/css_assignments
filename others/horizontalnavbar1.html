<!DOCTYPE html>
<html>
    <head>
        <title>
            Horizontal Navigation Bar
        </title>
        <style>
            body{
                margin: 0;
                padding: 0;
            }
            ul{
                display: block;
                background-color: rebeccapurple;
                list-style-type: none;
                font-size: 200%;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
          
            li a{
                float: left;
                text-decoration: none;
                color: black;
                padding: 10px 10px;
                background-color: rebeccapurple;
                color: antiquewhite;
                margin: 0;
            }
            li a:hover
            {
                background-color: antiquewhite;
                color: rebeccapurple;
            }
            .cherry
            {
                float: left;
            }
        </style>
    </head>
    <body>
        
        <ul>
            <li><a href="#">Apple</a></li>
            <li><a href="#">Mango</a></li>
            <li><a href="#">Strawberry</a></li>
            <li><a class="cherry" href="#">Cherry</a></li>
        </ul>
        <h1>Horizontal Navigation Bar</h1>
    </body>
</html>
