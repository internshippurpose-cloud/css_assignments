<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth System</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  width: 350px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.toggle {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #667eea;
}

.error {
  color: red;
  font-size: 13px;
}

.hidden {
  display: none;
}
</style>

</head>
<body>

<div class="container">

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <div class="error" id="loginEmailError"></div>

    <input type="password" id="loginPassword" placeholder="Password">
    <div class="error" id="loginPasswordError"></div>

    <button onclick="login()">Login</button>

    <div class="toggle" onclick="showSignup()">Create Account</div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <input type="text" id="name" placeholder="Full Name">
    <div class="error" id="nameError"></div>

    <input type="email" id="email" placeholder="Email">
    <div class="error" id="emailError"></div>

    <input type="password" id="password" placeholder="Password">
    <div class="error" id="passwordError"></div>

    <button onclick="signup()">Register</button>

    <div class="toggle" onclick="showLogin()">Already have account?</div>
  </div>

</div>

<script>
// Switch Forms
function showSignup() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("signupForm").classList.add("hidden");
  document.getElementById("loginForm").classList.remove("hidden");
}

// Signup Validation
function signup() {
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  let valid = true;

  document.getElementById("nameError").innerText = "";
  document.getElementById("emailError").innerText = "";
  document.getElementById("passwordError").innerText = "";

  if (name === "") {
    document.getElementById("nameError").innerText = "Name required";
    valid = false;
  }

  if (!email.includes("@")) {
    document.getElementById("emailError").innerText = "Valid email required";
    valid = false;
  }

  if (password.length < 6) {
    document.getElementById("passwordError").innerText = "Min 6 characters";
    valid = false;
  }

  if (valid) {
    alert("Registered Successfully!");
    showLogin();
  }
}

// Login Validation
function login() {
  let email = document.getElementById("loginEmail").value.trim();
  let password = document.getElementById("loginPassword").value.trim();

  let valid = true;

  document.getElementById("loginEmailError").innerText = "";
  document.getElementById("loginPasswordError").innerText = "";

  if (!email.includes("@")) {
    document.getElementById("loginEmailError").innerText = "Enter valid email";
    valid = false;
  }

  if (password.length < 6) {
    document.getElementById("loginPasswordError").innerText = "Invalid password";
    valid = false;
  }

  if (valid) {
    alert("Login Successful!");
  }
}
</script>

</body>
</html>
