<!--Registration form-->
<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #f4f4f4;
  font-family: Arial;
}
form {
  background: white;
  padding: 20px;
  width: 350px;
  margin: 50px auto;
  border-radius: 8px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  width: 100%;
  padding: 10px;
  background: purple;
  color: white;
}
</style>
</head>
<body>

<form>
  <h3>Register</h3>
  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Sign Up</button>
</form>

</body>
</html>
