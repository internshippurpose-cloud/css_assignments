<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS button hover effect
        </title>
    </head>
    <style>
        button{
            font-size: 50px;
            padding: 10px 10px;
            display: inline-block;
            background-color: white;
            transition-duration: 1s;
        }
        .blue
        {
            border: 2px solid blue;
            color: blue;
            border-radius: 12px;

        }
        .blue:hover{
            background-color: blue;
            background-image: linear-gradient(to bottom,darkblue,white);
            color: azure;
        }
         .red
        {
            border: 2px solid red;
            color: red;
            border-radius: 12px;

        }
        .red:hover{
            background-color: red;
            background-image: radial-gradient(yellow,orange,red);
            color:lightgoldenrodyellow;
        }

        .purple
        {
            border: 2px solid purple;
            color: purple;
            border-radius: 12px;

        }
        .purple:hover{
            background-color: purple;
            color:white;
        }

        .orange
        {
            border: 2px solid orange;
            color: orange;
            border-radius: 12px;

        }
        .orange:hover{
            background-color: orangered;
            color:yellow;
        }

        .green
        {
            border: 2px solid green;
            color: green;
            border-radius: 12px;

        }
        .green:hover{
            background-color: darkgreen;
            color:yellowgreen;
        }

    </style>
    <body>
        <h1>Hover effect on buttons</h1>
        <button class="blue">Blue</button><br><br>
        <button class="red">Red</button><br><br>
        <button class="purple">Purple</button><br><br>
        <button class="orange">Orange</button><br><br>
        <button class="green">Green</button><br><br>
    </body>
</html>
