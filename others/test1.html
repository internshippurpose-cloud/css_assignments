<!DOCTYPE html>
<html>
<head>
    <title>Anchor target with framename example</title>
</head>
<body>

    <h2>Click a link to load content into the frame below:</h2>
    
    <!-- The anchor tag with the target attribute set to the frame's name -->
    <p>
        Click to learn about 
        <a target="display-frame" href="https://en.wikipedia.org/wiki/Claude_Monet">Claude Monet</a>.
    </p>

    <!-- The iframe with a specific name attribute -->
    <iframe name="display-frame" style="width:100%;height:400px;border:2px solid #ccc;">
        Your browser does not support iframes.
    </iframe>

</body>
</html>
