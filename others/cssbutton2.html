<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS Button --- colouring
        </title>
        <style>
            .button
            {
                border-radius: 4px;
                text-align: center;
                padding: 15px 15px;
                display: inline-block;
                border: 2px dashed black;
                font-size: 25px;
            }
            .b1
            {
                background-color: bisque;
                color: blue;
            }
            .b2
            {
                background-color: aqua;
                color: darkblue;
            }
             .b3
            {
                background-color: aquamarine;
                color: brown
            }
             .b4
            {
                background-color: cornflowerblue;
                color:magenta;
            }
             .b5
            {
                background-color: purple;
                color: aliceblue;
            }
             .b6
            {
                background-color:limegreen;
                color: orange;
            }
            a{
                text-decoration: none;
                color: orange;
            }

        </style>
    </head>
    <body>
        <h1>Colourful buttons</h1>
        <button class="button b1">First</button>
        <button class="button b2">Second</button>
        <button class="button b3">Third</button>
        <button class="button b4">Fourth</button>
        <button class="button b5">Fifth</button>
        <button class="button b6"><a href="cssbutton1.html">Sixth</a></button>
    </body>
</html>
