<!DOCTYPE html>
<html>
    <head>
        <title>
            Navigation Bar --- Basic html 
        </title>
        <style>
            body{
                font-size: 200%;
            }
            ul{
                list-style-type: none;
                margin:0;
                padding:0;
                background-color: antiquewhite;
                width: 300px;
            }
            li a
            {
                display: block;
                text-decoration: none;
                color: black;

            }
            /* Change the link and background color on hover */
            li a:hover
            {
                background-color: gray;
                color: azure;
            }
        </style>
    </head>
    <body>
        <h1>Basic structure of navigation bar HTML</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact us</a></li>
            <li><a href="#">About us</a></li>
        </ul>
    </body>
</html>
