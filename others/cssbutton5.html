<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS button --- Disabled button
        </title>
        <style>
            button{
                background-color: black;
                color: wheat;
                display: inline-block;
                border: none;
                text-align: center;
                padding: 15px 15px;
                margin: 30px;
            }
            .b1
            {
                cursor: not-allowed;
                opacity: 0.4;
            }
        </style>
    </head>

    <body>
        <button class="b1">Disabled button</button>
    </body>
</html>
