<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS Buttons --- default, styling
        </title>
    </head>
    <style>
        .b1
        {
            background-color: aqua;
            color: black;
            border-radius: 4px;
            padding: 10px 10px;
            text-align: center;
            border: none;
            text-decoration: none;
            font-size: 20px;
            cursor: pointer;
            display:inline-block;
        }

    </style>
    <body>
        <h1>Default button</h1>
        <button>Click me</button>
        <input type="button" value="Click here">
        <h1>Styling button</h1>
        <button class="b1">Click Me</button>
        <input type="button" class="b1" value="Click Here">
    </body>
</html>
