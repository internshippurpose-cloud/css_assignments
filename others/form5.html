<!--Simple search form-->
<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: center;
  margin-top: 100px;
  font-family: Arial;
}
.search-box {
  display: flex;
}
input {
  padding: 10px;
  width: 200px;
}
button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
}
</style>
</head>
<body>

<div class="search-box">
  <input type="text" placeholder="Search...">
  <button>Go</button>
</div>

</body>
</html>
