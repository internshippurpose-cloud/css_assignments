<!DOCTYPE html>
<html>
    <head>
        <title>
            Table css --- Horizontal dividers
        </title>
        <style>
            table{
                border-collapse: collapse;
                width: 100%;
                font-size: 200%;
            }
           tbody tr
            {
                border-bottom: 2px dashed black;
            }
        </style>
    </head>
    <body>
        <h1>Horizontal dividers table</h1>
        <table>
            <thead>
                <tr>
                   <th>Name</th>
                   <th>Subject</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>AAA</td>
                    <td>English</td>
                </tr>
                <tr>
                    <td>BBB</td>
                    <td>Mathematics</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
