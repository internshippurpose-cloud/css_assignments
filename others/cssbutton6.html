<!DOCTYPE html>
<html>
    <head>
        <title>
            CSS button --- flex 
        </title>
        <style>
            .buttons1
            {
                display: flex;
                flex-wrap: wrap-reverse;
            }
            .buttons2
            {
                display: flex;
                flex-direction: column;
                width: 30%;
            }
            .b1
            {
                border: none;
                background-color:green;
                color: black;
                padding: 15px 15px;
                margin: 0;
                font-size: 50px;
                text-align: center;
                display: inline-block;
                width: auto;
            }
            .b1:hover{
                background-color:greenyellow;
            }

        </style>

    </head>
    <body>
        <h1>Horizontal button display</h1>
        <div class="buttons1">
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
        </div>
        <h1>Vertical button display</h1>
        <div class="buttons2">
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
            <button class="b1">Apple</button>
        </div>
    </body>
</html>
