<!--Contact form-->
<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; }
form {
  width: 320px;
  margin: auto;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ccc;
}
button {
  background: green;
  color: white;
  padding: 10px;
  border: none;
}
</style>
</head>
<body>

<form>
  <h3>Contact Us</h3>
  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button>Send</button>
</form>

</body>
</html>
